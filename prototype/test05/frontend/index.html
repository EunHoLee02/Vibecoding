<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Well Track Prototype</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Well Track Prototype</p>
        <h1>영양제 조합을 빠르게 정리하는 시연용 프로토타입</h1>
        <p class="hero-copy">
          입력한 영양제 조합을 기준으로 중복 성분, 과다 가능성, 복용 시간 가이드를
          일반 가이드 수준에서 보여줍니다.
        </p>
      </header>

      <nav class="route-nav">
        <button type="button" data-route-button="#/input">직접 입력</button>
        <button type="button" data-route-button="#/upload">샘플/업로드</button>
        <button type="button" data-route-button="#/result">결과 보기</button>
      </nav>

      <main id="app"></main>
    </div>

    <template id="input-view-template">
      <section class="view-card">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Screen 1</p>
            <h2>시작 및 직접 입력</h2>
          </div>
          <button type="button" id="reset-manual-button" class="ghost-button">초기화</button>
        </div>

        <p class="section-copy">
          영양제명과 성분 정보를 직접 입력한 뒤 분석을 실행합니다.
        </p>

        <div id="manual-supplement-list" class="stack"></div>

        <div class="action-row">
          <button type="button" id="add-supplement-button">영양제 추가</button>
          <button type="button" id="go-upload-button" class="secondary-button">샘플/업로드 열기</button>
          <button type="button" id="analyze-manual-button" class="accent-button">분석 실행</button>
        </div>
      </section>
    </template>

    <template id="upload-view-template">
      <section class="view-card">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Screen 2</p>
            <h2>샘플 또는 업로드 처리</h2>
          </div>
          <button type="button" id="back-input-button" class="ghost-button">직접 입력으로 돌아가기</button>
        </div>

        <div class="upload-grid">
          <div class="panel">
            <h3>샘플 선택</h3>
            <p class="panel-copy">빠른 시연용 샘플 데이터를 불러옵니다.</p>
            <div id="sample-list" class="sample-list"></div>
          </div>

          <div class="panel">
            <h3>파일 업로드 stub</h3>
            <p class="panel-copy">
              실제 OCR 대신 파일명을 전달하고 샘플 파싱 결과를 반환합니다.
            </p>
            <input id="upload-file-input" type="file" />
            <div class="action-row">
              <button type="button" id="upload-stub-button" class="accent-button">샘플 업로드 처리</button>
            </div>
          </div>
        </div>

        <div id="upload-preview" class="preview-card"></div>

        <div class="action-row">
          <button type="button" id="analyze-upload-button" class="accent-button">분석 실행</button>
        </div>
      </section>
    </template>

    <template id="result-view-template">
      <section class="view-card">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Screen 3</p>
            <h2>분석 결과</h2>
          </div>
          <button type="button" id="restart-button" class="ghost-button">다시 입력하기</button>
        </div>

        <p id="summary-text" class="summary-banner"></p>

        <div class="result-grid">
          <section class="panel">
            <h3>입력한 영양제 목록</h3>
            <div id="supplement-summary"></div>
          </section>

          <section class="panel">
            <h3>중복 성분</h3>
            <div id="duplicate-list"></div>
          </section>

          <section class="panel">
            <h3>과다 가능성</h3>
            <div id="risk-list"></div>
          </section>

          <section class="panel">
            <h3>복용 시간 가이드</h3>
            <div id="timing-list"></div>
          </section>
        </div>
      </section>
    </template>

    <template id="supplement-card-template">
      <article class="supplement-card">
        <div class="supplement-header">
          <h3></h3>
          <button type="button" class="ghost-button delete-supplement-button">영양제 삭제</button>
        </div>
        <div class="field-grid">
          <label>
            <span>영양제명</span>
            <input type="text" data-field="product_name" placeholder="예: Daily Multi C" />
          </label>
          <label>
            <span>제조사</span>
            <input type="text" data-field="manufacturer" placeholder="선택 입력" />
          </label>
        </div>
        <div class="ingredient-list"></div>
        <div class="action-row">
          <button type="button" class="secondary-button add-ingredient-button">성분 행 추가</button>
        </div>
      </article>
    </template>

    <template id="ingredient-row-template">
      <div class="ingredient-row">
        <input type="text" data-field="name" placeholder="성분명" />
        <input type="number" data-field="amount" min="0" step="0.1" placeholder="함량" />
        <input type="text" data-field="unit" placeholder="단위" />
        <button type="button" class="ghost-button delete-ingredient-button">삭제</button>
      </div>
    </template>

    <div id="toast" class="toast" hidden></div>
    <div id="loading-overlay" class="loading-overlay" hidden>
      <div class="loading-card">
        <p id="loading-text">처리 중입니다.</p>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
