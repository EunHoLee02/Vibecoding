services:
  postgres:
    image: postgres:15
    container_name: welltrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - welltrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: welltrack-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - welltrack_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: welltrack-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: well-track-backend
      APP_ENV: ${APP_ENV}
      APP_DEBUG: ${APP_DEBUG}
      API_V1_PREFIX: /api/v1
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      BACKEND_PUBLIC_BASE_URL: ${BACKEND_PUBLIC_BASE_URL}
      LOCAL_STORAGE_DIR: ${LOCAL_STORAGE_DIR}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_ECHO: ${DATABASE_ECHO}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW}
      DATABASE_POOL_TIMEOUT: ${DATABASE_POOL_TIMEOUT}
      DATABASE_POOL_RECYCLE: ${DATABASE_POOL_RECYCLE}
      DATABASE_POOL_PRE_PING: ${DATABASE_POOL_PRE_PING}
      REDIS_URL: redis://redis:6379/0
      AUTH_REDIS_PREFIX: ${AUTH_REDIS_PREFIX}
      AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME}
      AUTH_SESSION_TTL_MINUTES: ${AUTH_SESSION_TTL_MINUTES}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE}
      AUTH_COOKIE_HTTPONLY: ${AUTH_COOKIE_HTTPONLY}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN}
      MAIL_MODE: ${MAIL_MODE}
      OCR_ENGINE: ${OCR_ENGINE}
      OCR_LANG_LIST: ${OCR_LANG_LIST}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - welltrack_backend_storage:/app/.storage
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        API_BASE_URL: ${API_BASE_URL}
    container_name: welltrack-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  welltrack_postgres_data:
  welltrack_redis_data:
  welltrack_backend_storage:
